name: CI
on:
  push:
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install packages
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run check
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test
